<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Error — Zentor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=JetBrains+Mono:wght@400;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --acid: #D4FF00;
      --magenta: #FF0055;
      --blurple: #4B00FF;
      --cyan: #00F0FF;
      --bg: #030305;
      --text: #F3F4F6;
      --muted: rgba(243, 244, 246, 0.6);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    .radial-glow { position: fixed; inset: 0; z-index: 0; background: radial-gradient(circle at 80% 20%, rgba(75, 0, 255, 0.15) 0%, transparent 40%), radial-gradient(circle at 20% 80%, rgba(255, 0, 85, 0.1) 0%, transparent 40%); }
    .orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; animation: orb-drift linear infinite; will-change: transform; mix-blend-mode: screen; }
    .orb-1 { width: 50vw; height: 50vw; min-width: 300px; min-height: 300px; background: radial-gradient(circle, rgba(75,0,255,0.25), transparent 60%); top: -10%; left: -10%; filter: blur(80px); animation-duration: 35s; }
    .orb-2 { width: 40vw; height: 40vw; min-width: 250px; min-height: 250px; background: radial-gradient(circle, rgba(212,255,0,0.15), transparent 60%); bottom: -20%; right: -10%; filter: blur(90px); animation-duration: 25s; animation-direction: reverse; }
    @keyframes orb-drift { 0% { transform: translate(0,0) scale(1); } 33% { transform: translate(3vw, -5vh) scale(1.05); } 66% { transform: translate(-4vw, 4vh) scale(0.95); } 100% { transform: translate(0,0) scale(1); } }
    nav { position: relative; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 1.5rem 3rem; }
    .nav-logo { font-family: 'Unbounded', sans-serif; font-size: 1.5rem; font-weight: 900; letter-spacing: -0.05em; text-transform: uppercase; color: var(--text); display: flex; align-items: center; gap: 0.5rem; text-decoration: none; }
    .nav-logo::before { content: ''; display: block; width: 12px; height: 12px; background: var(--acid); border-radius: 2px; box-shadow: 0 0 10px var(--acid); animation: pulse-acid 2s infinite alternate; flex-shrink: 0; }
    @keyframes pulse-acid { from { box-shadow: 0 0 5px var(--acid); transform: scale(0.9); } to { box-shadow: 0 0 20px var(--acid); transform: scale(1.1); } }
    .nav-pill { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: var(--bg); padding: 0.4rem 1rem; border-radius: 2px; background: var(--acid); text-decoration: none; }
    main { position: relative; z-index: 2; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8rem 2rem 4rem; text-align: center; }
    .lottie-wrap { width: 100%; max-width: 500px; height: 400px; margin-bottom: 2rem; }
    .lottie-wrap iframe { width: 100%; height: 100%; border: none; }
    h1 { font-family: 'Unbounded', sans-serif; font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 900; margin-bottom: 1rem; text-transform: uppercase; }
    p { font-size: 1.1rem; color: var(--muted); margin-bottom: 2rem; max-width: 400px; }
    .btn-home { font-family: 'JetBrains Mono', monospace; font-size: 1rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: var(--bg); padding: 1rem 2rem; border-radius: 4px; background: var(--acid); text-decoration: none; transition: all 0.3s; }
    .btn-home:hover { background: var(--cyan); box-shadow: 0 0 30px rgba(0,240,255,0.4); }
    footer { position: relative; z-index: 2; text-align: center; padding: 2rem; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.1em; }
    @media (max-width: 768px) { nav { padding: 1rem 1.5rem; } main { padding: 6rem 1.5rem 3rem; } .lottie-wrap { height: 300px; } }
  </style>
</head>
<body>
  <div class="radial-glow"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <nav>
    <a href="./" class="nav-logo">Zentor</a>
    <a href="./" class="nav-pill">Home</a>
  </nav>

  <main>
    <div class="lottie-wrap">
      <iframe src="https://lottie.host/embed/9d3304a4-e3cc-4fb1-ac9c-adaa70796006/nwKZzUgTIk.lottie" title="Loading Animation"></iframe>
    </div>
    <h1>Something Went Wrong</h1>
    <p>The page you're looking for couldn't be loaded. Let's get you back on track.</p>
    <a href="./" class="btn-home">Back to Home</a>
  </main>

  <footer>
    <p>Zentor — Mentor for GenZ</p>
  </footer>
</body>
</html>
