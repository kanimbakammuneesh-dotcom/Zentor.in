name = "zentor-jobs-api"
main = "index.ts"
compatibility_date = "2026-04-17"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "JOBS_CACHE"
id = "fd23006c6b634a0face5675528df63a8"

# Rate Limiting (Cloudflare Workers Rate Limiting — GA)
# binding = the name used in env.RATELIMIT
# namespace_id = any integer (logical grouping, can be any unique number)
[[ratelimits]]
name = "RATELIMIT"
namespace_id = "1001"

[ratelimits.simple]
limit = 100
period = 60

[[hyperdrive]]
binding = "HYPERDRIVE"
id = "7f71417defaa426f8aa1ed91385f570f"

[vars]
ENV = "production"

# Secrets — set via wrangler CLI (never commit values):
# wrangler secret put REFRESH_SECRET